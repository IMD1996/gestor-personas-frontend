<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Personas</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <div class="container">

    <div id="authSection">
      <h1>Iniciar sesión</h1>

      <input type="text" id="loginEmail" placeholder="Correo">
      <input type="password" id="loginPassword" placeholder="Contraseña">
      <button class="btn btn-agregar" onclick="login()">Entrar</button>

      <h2>Registrarse</h2>
      <input type="text" id="registroNombre" placeholder="Nombre">
      <input type="email" id="registroEmail" placeholder="Correo">
      <input type="password" id="registroPassword" placeholder="Contraseña">
      <button class="btn btn-editar" onclick="registrar()">Registrarse</button>
    </div>

    <div id="appSection" class="oculto">
      <div class="top-bar">
        <h1>Gestor de Personas</h1>
        <div>
          <span id="usuarioLogueado"></span>
          <button class="btn btn-darkmode" onclick="toggleModoOscuro()">🌙</button>
          <button class="btn btn-item-eliminar" onclick="logout()">Salir</button>
        </div>
      </div>

      <p id="contador" style="text-align:center; font-weight:bold;"></p>

      <div class="formulario">
        <input type="hidden" id="personaId">
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="edad" placeholder="Edad">
        <input type="email" id="correo" placeholder="Correo">

        <div class="botones">
          <button class="btn btn-agregar" onclick="agregarPersona()">Agregar</button>
          <button class="btn btn-editar" onclick="editarPersona()">Editar</button>
        </div>
      </div>

      <input type="text" id="buscador" placeholder="Buscar por nombre..." oninput="filtrarPersonas()">

      <div id="loader" class="loader oculto">Cargando...</div>

      <h2>Lista de personas</h2>
      <ul id="listaPersonas"></ul>
    </div>
  </div>

  <div id="modal" class="modal oculto">
    <div class="modal-content">
      <p id="modal-texto">¿Seguro?</p>
      <div class="modal-botones">
        <button onclick="confirmarEliminar()">Sí</button>
        <button onclick="cerrarModal()">No</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="script.js?v=6"></script>
</body>
</html>
